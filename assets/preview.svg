<svg width="1280" height="720" viewBox="0 0 1280 720" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="120" y1="80" x2="1160" y2="640" gradientUnits="userSpaceOnUse">
      <stop stop-color="#151829"/>
      <stop offset="1" stop-color="#0C1020"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#202742"/>
      <stop offset="1" stop-color="#161C31"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#8B5CF6"/>
      <stop offset="1" stop-color="#38BDF8"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="22" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="1280" height="720" rx="32" fill="url(#bg)"/>
  <circle cx="1090" cy="120" r="190" fill="#8B5CF6" fill-opacity="0.12"/>
  <circle cx="180" cy="610" r="220" fill="#38BDF8" fill-opacity="0.10"/>

  <text x="88" y="116" fill="#EEF2FF" font-size="56" font-family="Inter, Arial, sans-serif" font-weight="700">pi-prompt-reviewer</text>
  <text x="88" y="160" fill="#A5B4FC" font-size="24" font-family="Inter, Arial, sans-serif">Turn rough prompts into clear, send-ready requests before they reach pi.</text>

  <g filter="url(#shadow)">
    <rect x="88" y="220" width="400" height="370" rx="28" fill="url(#panel)" stroke="#3B4261"/>
    <text x="124" y="272" fill="#94A3B8" font-size="22" font-family="Inter, Arial, sans-serif" font-weight="600">Before</text>
    <rect x="124" y="302" width="328" height="220" rx="20" fill="#0F1425" stroke="#2D3655"/>
    <text x="150" y="352" fill="#E2E8F0" font-size="24" font-family="Inter, Arial, sans-serif">make this better and use</text>
    <text x="150" y="388" fill="#E2E8F0" font-size="24" font-family="Inter, Arial, sans-serif">the same thing from above</text>
    <text x="150" y="424" fill="#E2E8F0" font-size="24" font-family="Inter, Arial, sans-serif">but shorter and fix typos</text>
    <text x="150" y="478" fill="#64748B" font-size="20" font-family="Inter, Arial, sans-serif">ambiguous • rough • easy to misread</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="792" y="220" width="400" height="370" rx="28" fill="url(#panel)" stroke="#3B4261"/>
    <text x="828" y="272" fill="#94A3B8" font-size="22" font-family="Inter, Arial, sans-serif" font-weight="600">After</text>
    <rect x="828" y="302" width="328" height="220" rx="20" fill="#0F1425" stroke="#2D3655"/>
    <text x="854" y="346" fill="#E2E8F0" font-size="22" font-family="Inter, Arial, sans-serif">Rewrite the previous prompt using</text>
    <text x="854" y="380" fill="#E2E8F0" font-size="22" font-family="Inter, Arial, sans-serif">the same intent, but make it shorter,</text>
    <text x="854" y="414" fill="#E2E8F0" font-size="22" font-family="Inter, Arial, sans-serif">clearer, and free of typos.</text>
    <text x="854" y="468" fill="#67E8F9" font-size="20" font-family="Inter, Arial, sans-serif">clear • specific • send-ready</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="528" y="248" width="224" height="316" rx="32" fill="#10172B" stroke="#36415F"/>
    <rect x="556" y="284" width="168" height="44" rx="14" fill="url(#accent)"/>
    <text x="582" y="312" fill="#F8FAFC" font-size="22" font-family="Inter, Arial, sans-serif" font-weight="700">Review</text>
    <text x="626" y="312" fill="#E0F2FE" font-size="22" font-family="Inter, Arial, sans-serif" font-weight="700">→</text>
    <circle cx="640" cy="398" r="58" fill="#172036" stroke="#475569"/>
    <path d="M640 360L649 387L678 387L654 404L663 432L640 415L617 432L626 404L602 387L631 387L640 360Z" fill="url(#accent)"/>
    <text x="571" y="494" fill="#CBD5E1" font-size="22" font-family="Inter, Arial, sans-serif" font-weight="600">prompt cleanup</text>
    <text x="558" y="526" fill="#7DD3FC" font-size="18" font-family="Inter, Arial, sans-serif">clarity · context · constraints</text>
  </g>

  <path d="M488 406H528" stroke="url(#accent)" stroke-width="8" stroke-linecap="round"/>
  <path d="M752 406H792" stroke="url(#accent)" stroke-width="8" stroke-linecap="round"/>
  <path d="M512 388L540 406L512 424" stroke="url(#accent)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M768 388L740 406L768 424" stroke="url(#accent)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>

  <rect x="88" y="624" width="1104" height="48" rx="18" fill="#0F1425" stroke="#2A3552"/>
  <text x="120" y="655" fill="#C7D2FE" font-size="20" font-family="Inter, Arial, sans-serif">Intercept prompt → review with lightweight model → load polished prompt back into the editor</text>
</svg>
